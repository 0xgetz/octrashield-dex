# Cargo configuration for OctraShield DEX
# This file configures Cargo to use GitHub tokens for private repositories

# Global registry configuration
[registries]
crates-io = { index = "https://github.com/rust-lang/crates.io-index" }

# GitHub registry configuration for octra-labs private repos
# Replace GITHUB_TOKEN with your actual token or use environment variable
[registries.octra-labs]
index = "sparse+https://github.com/octra-labs/crates-index"
token = "GITHUB_TOKEN"  # Will be replaced by environment variable or setup script

# HTTP configuration for GitHub authentication
[http]
# Use the GitHub token for all GitHub requests
headers = ["Authorization = \"Bearer ${GITHUB_TOKEN}\""]

# Alternatively, configure per-repository authentication via git
[net]
git-fetch-with-cli = true

# Git configuration for private repositories
# This allows cargo to clone private repos using SSH or HTTPS with token
[git]
# Use SSH for GitHub (recommended if you have SSH keys set up)
# github.com = "ssh://git@github.com/"

# Or use HTTPS with token substitution
# github.com = "https://x-access-token:${GITHUB_TOKEN}@github.com/"

# Environment variable substitution for GITHUB_TOKEN
# Cargo will automatically substitute ${GITHUB_TOKEN} with the value from environment
