# =============================================================================
# OctraShield DEX — Local Development Environment
# =============================================================================
# Usage:
#   docker compose -f docker/docker-compose.yml up -d
#   docker compose -f docker/docker-compose.yml logs -f app
#   docker compose -f docker/docker-compose.yml down
# =============================================================================

version: '3.9'

services:
  # ---------------------------------------------------------------------------
  # DEX Frontend (Nginx)
  # ---------------------------------------------------------------------------
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        VITE_NETWORK: localnet
        VITE_FACTORY_ADDRESS: octra1factory_local
        VITE_ROUTER_ADDRESS: octra1router_local
        VITE_AI_ENGINE_ADDRESS: octra1ai_local
        VITE_RPC_URL: http://localnet:26657
    ports:
      - '3000:80'
    depends_on:
      localnet:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - octrashield

  # ---------------------------------------------------------------------------
  # Octra Localnet Node (simulated chain)
  # ---------------------------------------------------------------------------
  localnet:
    image: octrachain/localnet:latest
    ports:
      - '26657:26657'   # RPC
      - '26656:26656'   # P2P
      - '1317:1317'     # REST API
      - '9090:9090'     # gRPC
    environment:
      CHAIN_ID: octra-localnet-1
      BLOCK_TIME: 1s
      VALIDATOR_MNEMONIC: "${LOCALNET_MNEMONIC:-test test test test test test test test test test test junk}"
      DEPLOY_CONTRACTS: 'true'
      CONTRACTS_DIR: /contracts
    volumes:
      - localnet-data:/root/.octra
      - ../contracts:/contracts:ro
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:26657/health']
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s
    restart: unless-stopped
    networks:
      - octrashield

  # ---------------------------------------------------------------------------
  # Redis (AI Engine observation cache)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    command: redis-server --save 60 1 --loglevel warning
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped
    networks:
      - octrashield

  # ---------------------------------------------------------------------------
  # AI Engine Service (observation ingestion + fee computation)
  # ---------------------------------------------------------------------------
  ai-service:
    image: octrashield/ai-service:latest
    ports:
      - '8080:8080'
    environment:
      REDIS_URL: redis://redis:6379
      RPC_URL: http://localnet:26657
      AI_ENGINE_ADDRESS: octra1ai_local
      OBSERVATION_INTERVAL: 60
      WINDOW_SIZE: 24
      LOG_LEVEL: debug
    depends_on:
      redis:
        condition: service_healthy
      localnet:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - octrashield

volumes:
  localnet-data:
  redis-data:

networks:
  octrashield:
    driver: bridge
