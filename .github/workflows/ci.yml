# OctraShield DEX — Continuous Integration
#
# Triggers: push to main, pull requests
# Jobs: lint, typecheck, test-contracts, test-sdk, test-app, build

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  PNPM_VERSION: 9
  NODE_VERSION: 20
  RUST_VERSION: nightly-2024-12-01

jobs:
  # ================================================================
  # Lint & Format
  # ================================================================
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: rustfmt, clippy

      - name: Rust format check
        working-directory: contracts
        run: cargo fmt --all -- --check

      - name: Rust clippy
        working-directory: contracts
        run: cargo clippy --all-targets --all-features -- -D warnings

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Biome lint (SDK)
        working-directory: sdk
        run: pnpm exec biome check src/

      - name: Biome lint (App)
        working-directory: app
        run: pnpm exec biome check src/

  # ================================================================
  # TypeScript Type Check
  # ================================================================
  typecheck:
    name: TypeScript Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Typecheck SDK
        working-directory: sdk
        run: pnpm exec tsc --noEmit

      - name: Typecheck App
        working-directory: app
        run: pnpm exec tsc --noEmit

  # ================================================================
  # Rust Contract Tests
  # ================================================================
  test-contracts:
    name: Test Contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            contracts/target/
          key: cargo-${{ runner.os }}-${{ hashFiles('contracts/**/Cargo.lock') }}
          restore-keys: cargo-${{ runner.os }}-

      - name: Run contract tests
        working-directory: contracts
        run: cargo test --all --verbose

      - name: Run contract tests (release)
        working-directory: contracts
        run: cargo test --all --release

  # ================================================================
  # SDK Tests
  # ================================================================
  test-sdk:
    name: Test SDK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run SDK tests
        working-directory: sdk
        run: pnpm exec vitest run --coverage

      - name: Upload SDK coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sdk-coverage
          path: sdk/coverage/
          retention-days: 7

  # ================================================================
  # App Tests
  # ================================================================
  test-app:
    name: Test App
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build SDK (app depends on it)
        working-directory: sdk
        run: pnpm build

      - name: Run App tests
        working-directory: app
        run: pnpm exec vitest run --coverage

      - name: Upload App coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: app-coverage
          path: app/coverage/
          retention-days: 7

  # ================================================================
  # Build Artifacts
  # ================================================================
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test-contracts, test-sdk, test-app]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: wasm32-unknown-unknown

      - name: Build contracts (WASM)
        working-directory: contracts
        run: cargo build --release --target wasm32-unknown-unknown

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build SDK
        working-directory: sdk
        run: pnpm build

      - name: Build App
        working-directory: app
        run: pnpm build

      - name: Upload WASM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wasm-contracts
          path: contracts/target/wasm32-unknown-unknown/release/*.wasm
          retention-days: 30

      - name: Upload App dist
        uses: actions/upload-artifact@v4
        with:
          name: app-dist
          path: app/dist/
          retention-days: 30
