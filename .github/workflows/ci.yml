# OctraShield DEX — Continuous Integration
#
# Triggers: push to main/develop, pull requests to main
# Jobs: lint, typecheck, test-contracts, test-sdk, test-app, build
#
# Octra Network context:
#   - NOT EVM: no numeric chain ID, uses string "v3.0.0-irmin"
#   - RPC: http://46.101.86.250:8080/rpc (JSON-RPC 2.0 POST)
#   - Signing: Ed25519 (not ECDSA)
#   - Fees: Operation Units (OU), not gas

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  PNPM_VERSION: 9
  NODE_VERSION: 20
  RUST_VERSION: nightly-2024-12-01
  OCTRA_RPC_URL: http://46.101.86.250:8080/rpc

jobs:
  # ================================================================
  # Lint & Format
  # ================================================================
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: rustfmt, clippy

      - name: Rust cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            contracts/target/
          key: cargo-lint-${{ runner.os }}-${{ hashFiles('contracts/**/Cargo.lock', 'contracts/Cargo.toml') }}
          restore-keys: cargo-lint-${{ runner.os }}-

      - name: Rust format check
        working-directory: contracts
        run: cargo fmt --all -- --check

      - name: Rust clippy
        working-directory: contracts
        run: cargo clippy --all-targets --all-features -- -D warnings

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Biome lint (SDK)
        working-directory: sdk
        run: pnpm exec biome check src/

      - name: Biome format check (SDK)
        working-directory: sdk
        run: pnpm exec biome format src/

      - name: Biome lint (App)
        working-directory: app
        run: pnpm exec biome check src/

      - name: Biome format check (App)
        working-directory: app
        run: pnpm exec biome format src/

  # ================================================================
  # TypeScript Type Check
  # ================================================================
  typecheck:
    name: TypeScript Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Node modules cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.pnpm-store
            node_modules
            sdk/node_modules
            app/node_modules
          key: pnpm-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - run: pnpm install --frozen-lockfile

      - name: Typecheck SDK
        working-directory: sdk
        run: pnpm exec tsc --noEmit

      - name: Typecheck App
        working-directory: app
        run: pnpm exec tsc --noEmit

  # ================================================================
  # Rust Contract Tests
  # ================================================================
  test-contracts:
    name: Test Contracts (Rust)
    runs-on: ubuntu-latest
    env:
      OCTRA_RPC_URL: ${{ env.OCTRA_RPC_URL }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Cargo registry + target cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            contracts/target/
          key: cargo-test-${{ runner.os }}-${{ hashFiles('contracts/**/Cargo.lock', 'contracts/Cargo.toml') }}
          restore-keys: cargo-test-${{ runner.os }}-

      - name: Run contract tests
        working-directory: contracts
        run: cargo test --all --verbose
        env:
          OCTRA_RPC_URL: http://46.101.86.250:8080/rpc

      - name: Run contract tests (release mode)
        working-directory: contracts
        run: cargo test --all --release
        env:
          OCTRA_RPC_URL: http://46.101.86.250:8080/rpc

  # ================================================================
  # SDK Tests
  # ================================================================
  test-sdk:
    name: Test SDK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Node modules cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.pnpm-store
            node_modules
            sdk/node_modules
          key: pnpm-sdk-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: pnpm-sdk-${{ runner.os }}-

      - run: pnpm install --frozen-lockfile

      - name: Run SDK tests (vitest)
        working-directory: sdk
        run: pnpm exec vitest run --coverage
        env:
          OCTRA_RPC_URL: http://46.101.86.250:8080/rpc

      - name: Upload SDK coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sdk-coverage
          path: sdk/coverage/
          retention-days: 7

  # ================================================================
  # App Tests
  # ================================================================
  test-app:
    name: Test App
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Node modules cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.pnpm-store
            node_modules
            sdk/node_modules
            app/node_modules
          key: pnpm-app-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: pnpm-app-${{ runner.os }}-

      - run: pnpm install --frozen-lockfile

      - name: Build SDK (app depends on it)
        working-directory: sdk
        run: pnpm build

      - name: Run App tests (vitest)
        working-directory: app
        run: pnpm exec vitest run --coverage
        env:
          OCTRA_RPC_URL: http://46.101.86.250:8080/rpc

      - name: Upload App coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: app-coverage
          path: app/coverage/
          retention-days: 7

  # ================================================================
  # Build Artifacts
  # ================================================================
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test-contracts, test-sdk, test-app]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: wasm32-unknown-unknown

      - name: Cargo cache (build)
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            contracts/target/
          key: cargo-build-${{ runner.os }}-${{ hashFiles('contracts/**/Cargo.lock', 'contracts/Cargo.toml') }}
          restore-keys: cargo-build-${{ runner.os }}-

      - name: Build contracts (WASM)
        working-directory: contracts
        run: cargo build --release --target wasm32-unknown-unknown

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Node modules cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.pnpm-store
            node_modules
            sdk/node_modules
            app/node_modules
          key: pnpm-build-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: pnpm-build-${{ runner.os }}-

      - run: pnpm install --frozen-lockfile

      - name: Build SDK
        working-directory: sdk
        run: pnpm build

      - name: Build App
        working-directory: app
        run: pnpm build
        env:
          VITE_OCTRA_RPC_URL: http://46.101.86.250:8080/rpc

      - name: Upload WASM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wasm-contracts
          path: contracts/target/wasm32-unknown-unknown/release/*.wasm
          retention-days: 30

      - name: Upload App dist
        uses: actions/upload-artifact@v4
        with:
          name: app-dist
          path: app/dist/
          retention-days: 30
