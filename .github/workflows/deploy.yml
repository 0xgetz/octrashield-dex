# OctraShield DEX — Deployment Pipeline
#
# Staging: auto-deploy on push to main (after CI passes)
# Production: deploy on version tags (v*)

name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  push:
    tags: ['v*']

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/dex-app

jobs:
  # ================================================================
  # Build & Push Docker Image
  # ================================================================
  docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      image_digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VITE_NETWORK=mainnet
            VITE_FACTORY_ADDRESS=${{ vars.FACTORY_ADDRESS }}
            VITE_ROUTER_ADDRESS=${{ vars.ROUTER_ADDRESS }}
            VITE_AI_ENGINE_ADDRESS=${{ vars.AI_ENGINE_ADDRESS }}

  # ================================================================
  # Deploy to Staging
  # ================================================================
  staging:
    name: Deploy Staging
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_run'
    environment:
      name: staging
      url: https://staging.octrashield.io
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to staging
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            docker compose -f /opt/octrashield/docker-compose.staging.yml up -d --force-recreate app
            echo "Deployed to staging: ${{ needs.docker.outputs.image_tag }}"

      - name: Smoke test staging
        run: |
          sleep 10
          curl -sf https://staging.octrashield.io/health || exit 1
          echo "Staging smoke test passed"

  # ================================================================
  # Deploy to Production
  # ================================================================
  production:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: docker
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: production
      url: https://app.octrashield.io
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to production
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
            docker compose -f /opt/octrashield/docker-compose.prod.yml up -d --force-recreate app
            echo "Deployed to production: ${{ github.ref_name }}"

      - name: Smoke test production
        run: |
          sleep 15
          curl -sf https://app.octrashield.io/health || exit 1
          echo "Production smoke test passed"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            contracts/target/wasm32-unknown-unknown/release/*.wasm
